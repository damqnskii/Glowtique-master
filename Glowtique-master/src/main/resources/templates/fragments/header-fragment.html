<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="/css/logged-header.css">
    <title>Title</title>
</head>
<body>
<script>
    (function () {
        const savedTheme = localStorage.getItem('glowtique-theme') || 'dark';
        document.documentElement.setAttribute('data-theme', savedTheme);
    })();
</script>
<header th:fragment="header" class="header">
    <div class="top-bar" id="top-bar-id">
        <div class="search">
                <span><svg xmlns="http://www.w3.org/2000/svg" fill="#000000" width="31px" height="30px" viewBox="0 0 32 32" version="1.1">
                    <title>search</title>
                    <path d="M30.531 29.469l-10.453-10.453c1.604-1.861 2.58-4.301 2.58-6.97 0-5.912-4.793-10.704-10.704-10.704s-10.704 4.793-10.704 10.704c0 5.912 4.793 10.704 10.704 10.704 0.016 0 0.032-0 0.048-0h-0.002c2.697-0.011 5.156-1.022 7.027-2.681l-0.011 0.010 10.453 10.453c0.136 0.136 0.324 0.22 0.531 0.22 0.415 0 0.751-0.336 0.751-0.751 0-0.207-0.084-0.395-0.22-0.531v0zM2.75 12c0-5.109 4.141-9.25 9.25-9.25s9.25 4.141 9.25 9.25c0 5.109-4.141 9.25-9.25 9.25v0c-5.106-0.006-9.244-4.144-9.25-9.249v-0.001z"/>
                    </svg></span>
            <input type="text" id="searchInput" placeholder="Търси продукт..." autocomplete="off">
            <div id="suggestions" class="suggestions-box"></div>
        </div>
        <script>
            document.getElementById('searchInput').addEventListener('input', function () {
                const query = this.value.trim();
                const box = document.getElementById('suggestions');

                if (query.length < 2) {
                    box.innerHTML = '';
                    return;
                }

                fetch(`/products/suggest?query=${encodeURIComponent(query)}`)
                    .then(res => res.json())
                    .then(data => {
                        box.innerHTML = '';
                        if (data.length === 0) {
                            box.innerHTML = '<p class="no-results">Няма съвпадения</p>';
                            return;
                        }

                        data.forEach(product => {
                            const item = document.createElement('div');
                            item.className = 'suggestion-item';
                            item.innerHTML =
                                `<a href="/product/${product.id}">${product.name} - ${product.volume} мл. <img src="${  product.image}" alt="${product.name}" style="height: 40px; margin-left: 10px;"></a>`;
                            box.appendChild(item);
                        });
                    });
            });
        </script>
        <div class="logo">
            <h1><a th:href="@{/home}"><img class="glowtique-logo" src="/images/glowtique-logo.png" alt="glowtique"></a></h1>
        </div>
        <div class="icons">
            <button class="theme-toggle header-icon-button" type="button" aria-label="Смени тема" title="Смени тема">
                <span class="header-icon theme-toggle-icon" aria-hidden="true">☾</span>
            </button>

            <a class="header-icon-link icon-location" th:href="@{/location}" aria-label="Локация" title="Локация">
                        <span class="header-icon location-icon">
                            <svg viewBox="0 0 24 24" aria-hidden="true">
                                <path d="M12 21s7-6.2 7-12a7 7 0 1 0-14 0c0 5.8 7 12 7 12Z"></path>
                                <circle cx="12" cy="9" r="2.4"></circle>
                            </svg>
                        </span>
            </a>

            <a class="header-icon-link" th:href="@{/beautycard}" aria-label="Beauty card" title="Beauty card">
                        <span class="header-icon beautycard-icon">
                            <svg viewBox="0 0 24 24" aria-hidden="true">
                                <rect x="3" y="6" width="18" height="13" rx="2"></rect>
                                <path d="M3 10h18"></path>
                                <path d="M7 15h5"></path>
                                <path d="M16 15h2"></path>
                            </svg>
                        </span>
            </a>

            <a class="header-icon-link" th:href="@{/profile}" aria-label="Профил" title="Профил">
                        <span class="header-icon profile-icon">
                            <svg viewBox="0 0 24 24" aria-hidden="true">
                                <circle cx="12" cy="8" r="4"></circle>
                                <path d="M4.5 20c1.4-4 4.2-6 7.5-6s6.1 2 7.5 6"></path>
                            </svg>
                        </span>
            </a>

            <a class="header-icon-link" th:href="@{/wishlist}" aria-label="Любими" title="Любими">
                        <span class="header-icon wishlist-header-icon">
                            <svg viewBox="0 0 24 24" aria-hidden="true">
                                <path d="M20.8 5.6a5.4 5.4 0 0 0-7.7 0L12 6.8l-1.1-1.2a5.4 5.4 0 0 0-7.7 7.7L12 22l8.8-8.7a5.4 5.4 0 0 0 0-7.7Z"></path>
                            </svg>
                        </span>
            </a>

            <a class="header-icon-link" th:href="@{/cart}" aria-label="Количка" title="Количка">
                        <span class="header-icon cart-icon">
                            <svg viewBox="0 0 24 24" aria-hidden="true">
                                <path d="M3 4h2l2.1 10.3a2 2 0 0 0 2 1.7h7.8a2 2 0 0 0 1.9-1.4L21 7H6"></path>
                                <circle cx="9" cy="20" r="1.4"></circle>
                                <circle cx="18" cy="20" r="1.4"></circle>
                            </svg>
                        </span>
            </a>

            <a class="header-icon-link logout" th:href="@{/logout}" aria-label="Изход" title="Изход">
                        <span class="header-icon logout-icon">
                            <svg viewBox="0 0 24 24" aria-hidden="true">
                                <path d="M10 4H5a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h5"></path>
                                <path d="M15 17l5-5-5-5"></path>
                                <path d="M20 12H8"></path>
                            </svg>
                        </span>
            </a>
        </div>            </div>

    <div class="menu" id="menu-id">
        <ul class="menu-sections">
            <li>
                <a th:href="@{/brands}" class="brands-menu"><p>МАРКИ</p></a>
                <ul class="dropdown">
                    <li><a th:href="@{/brand/0221173b-83be-4158-aa4d-7a40c4693349}">Dior</a></li>
                    <li><a th:href="@{/brand/79b9aeac-bdff-4449-aba7-95dbd2d334f3}">BVLGARI</a></li>
                    <li><a th:href="@{/brand/38cf031c-8ea8-4bfb-b36a-c7c9df9edc65}">AZZARO</a></li>
                    <li><a th:href="@{/brand/4b78d577-af04-4081-88d5-62aca4d5003a}">BURBERRY</a></li>
                    <li><a th:href="@{/brand/5926acb6-4d71-4dbf-bd62-0db27e95ae80}">ABERCROMBIE & FITCH</a></li>
                    <li><a th:href="@{/brand/9788f9f7-cfa3-46e0-858b-25998d95728f}">ACQUA DI PARMA</a></li>
                </ul>
            </li>
            <li>
                <a th:href="@{/products}" class="face-menu"><p>ПРОДУКТИ</p></a>
                <ul class="dropdown">
                    <li><a th:href="@{/products?categories=a875da6b-ebe3-42ec-a14a-176e81821b44}">Парфюми</a></li>
                    <li><a th:href="@{/products?categories=816feb52-3424-4ab9-8627-eb0cbf13100a}">Тестери</a></li>
                    <li><a th:href="@{/products?categories=912abb0d-2606-4a56-b895-330c9faba125}">Нишови</a></li>
                    <li><a th:href="@{/products?categories=37ad41d6-f564-4c22-bb25-4b8b54db6bf1}">Козметика за тяло</a></li>
                    <li><a th:href="@{/products?categories=87168e97-efcc-452d-a669-60e5d7d04dc0}">Комплекти</a></li>
                </ul>
            </li>
        </ul>
    </div>
    <script src="/css/theme-toggle.js"></script>
</header>

</body>

</html>
